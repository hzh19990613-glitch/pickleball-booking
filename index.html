<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>匹克球場租用 · 客戶預約</title>
    <style>
        /* 全域重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', 'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
        }

        html, body {
            height: 100%;
            width: 100%;
        }

        body {
            background: #f0f2f5;
            margin: 0;
            padding: 16px;
            display: flex;
            justify-content: center;   /* 水平居中 */
            align-items: center;       /* 垂直居中 */
            min-height: 100vh;
        }

        .container {
            max-width: 1100px;
            width: 100%;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.04);
            padding: 28px 24px;
            transition: all 0.2s;
            /* 確保容器高度不超過視口，超出時內部滾動 */
            max-height: calc(100vh - 32px);
            overflow-y: auto;
            /* 強制水平居中（備用） */
            margin-left: auto !important;
            margin-right: auto !important;
        }

        /* 標題 */
        .title {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: #1e293b;
            margin-bottom: 24px;
            line-height: 1.2;
            text-align: left;          /* 標題左對齊，符合設計 */
        }

        /* 日期導航 */
        .date-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f8fafc;
            padding: 12px 18px;
            border-radius: 60px;
            margin-bottom: 28px;
            border: 1px solid #e9eef2;
        }

        .date-display {
            font-size: 1.35rem;
            font-weight: 500;
            color: #0f172a;
            background: white;
            padding: 6px 22px;
            border-radius: 40px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
        }

        .arrow-btn {
            background: white;
            border: 1px solid #dde3e9;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 1.6rem;
            line-height: 1;
            color: #334155;
            cursor: pointer;
            transition: 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
        }

        .arrow-btn:hover {
            background: #f1f5f9;
            border-color: #b9c7d6;
        }

        /* 時段網格 */
        .slot-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            margin: 28px 0 24px;
        }

        .slot-card {
            background: #f9fbfd;
            border: 1px solid #e6edf4;
            border-radius: 24px;
            padding: 16px 8px;
            text-align: center;
            transition: border 0.15s, background 0.15s;
            cursor: default;
            box-shadow: 0 4px 8px rgba(0,0,0,0.01);
        }

        .slot-card.clickable {
            cursor: pointer;
            background: #f2f7ff;
            border-color: #bdd3eb;
        }

        .slot-card.clickable:hover {
            background: #e3edfa;
            border-color: #8ba9cc;
        }

        .slot-card.booked {
            background: #edf2f7;
            border-color: #d0dbe8;
            color: #6f7c8f;
            opacity: 0.85;
        }

        .slot-time {
            font-weight: 650;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
            color: #1e2b3c;
            margin-bottom: 6px;
        }

        .slot-status {
            font-size: 1rem;
            font-weight: 500;
            padding: 4px 0 2px;
        }

        .slot-price {
            font-size: 1rem;
            color: #2d4b2d;
            background: #e5f0e5;
            display: inline-block;
            padding: 4px 14px;
            border-radius: 40px;
            margin-top: 8px;
            font-weight: 500;
        }

        .slot-card.booked .slot-price {
            background: #dfe6ef;
            color: #4f5d6e;
        }

        /* 選中時段提示 */
        .selected-hint {
            background: #eaf3ff;
            padding: 16px 22px;
            border-radius: 50px;
            margin: 16px 0 26px;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            border: 1px solid #cad9f0;
        }

        .selected-info {
            font-weight: 500;
            color: #004080;
            flex: 1 1 auto;
            min-width: 200px;
        }

        .selected-info span {
            background: white;
            padding: 6px 20px;
            border-radius: 40px;
            margin-left: 10px;
            font-weight: 600;
            color: #0b3858;
            display: inline-block;
            margin-top: 4px;
            margin-bottom: 4px;
        }

        .clear-selected {
            background: none;
            border: 1px solid #8ba9cc;
            padding: 8px 20px;
            border-radius: 40px;
            color: #214973;
            cursor: pointer;
            transition: 0.15s;
            font-size: 0.95rem;
            flex-shrink: 0;
        }

        .clear-selected:hover {
            background: #d4e2f5;
        }

        /* 預約表單 */
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 24px;
        }

        .form-group {
            flex: 1 1 200px;
        }

        label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            color: #2c3f5c;
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }

        input {
            width: 100%;
            padding: 15px 18px;
            border: 1px solid #dde3e9;
            border-radius: 30px;
            font-size: 1rem;
            background: #fbfdff;
            transition: 0.15s;
        }

        input:focus {
            outline: none;
            border-color: #8199b5;
            box-shadow: 0 0 0 4px rgba(129, 153, 181, 0.12);
        }

        input[type="tel"]:invalid {
            border-color: #faccac;
        }

        .btn-primary {
            background: #1e293b;
            border: none;
            color: white;
            font-weight: 600;
            padding: 15px 32px;
            border-radius: 40px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background 0.15s;
            box-shadow: 0 6px 14px rgba(0,0,0,0.05);
            width: auto;
            min-width: 200px;
        }

        .btn-primary:hover:not(:disabled) {
            background: #0f172a;
        }

        .btn-primary:disabled {
            background: #b3c1d1;
            cursor: not-allowed;
            opacity: 0.6;
        }

        /* 管理後台區域 */
        .admin-panel {
            display: none;
            margin-top: 32px;
            border-top: 2px dashed #d4dfeb;
            padding-top: 20px;
        }

        .admin-panel.visible {
            display: block;
        }

        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 0 0 18px;
        }

        .list-header h2 {
            font-size: 1.4rem;
            font-weight: 650;
            color: #1e2b3c;
        }

        .reset-btn {
            background: white;
            border: 1.5px solid #c0ccda;
            padding: 10px 28px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #3d4f66;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
        }

        .reset-btn:hover {
            background: #f1f5f9;
            border-color: #96abc0;
        }

        .appointment-list {
            list-style: none;
            border-top: 1px solid #e6edf4;
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 12px;
        }

        .appointment-list li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 6px 16px 0;
            border-bottom: 1px solid #ecf3f8;
            font-size: 1rem;
        }

        .appointment-info {
            flex: 1;
            word-break: break-word;
        }

        .appointment-info strong {
            font-weight: 650;
            color: #15304e;
        }

        .appointment-date {
            font-size: 0.9rem;
            color: #4f637b;
            margin-top: 4px;
        }

        .delete-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            line-height: 1;
            color: #95aec9;
            cursor: pointer;
            padding: 8px 8px 8px 16px;
            border-radius: 40px;
            transition: 0.1s;
        }

        .delete-btn:hover {
            color: #b22222;
            background: #fae6e6;
        }

        .empty-message {
            text-align: center;
            color: #9aafc4;
            padding: 30px 0;
        }

        .footer-note {
            margin-top: 24px;
            color: #8aa0b8;
            font-size: 0.85rem;
            text-align: center;
            border-top: 1px dashed #d8e2ed;
            padding-top: 22px;
        }

        .admin-link {
            text-align: center;
            margin-top: 16px;
            font-size: 0.9rem;
        }
        .admin-link button {
            background: none;
            border: 1px solid #cbd5e1;
            padding: 8px 24px;
            border-radius: 40px;
            color: #475569;
            cursor: pointer;
            font-size: 0.95rem;
            transition: 0.15s;
        }
        .admin-link button:hover {
            background: #f1f5f9;
            border-color: #94a3b8;
        }

        /* 登入 Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal.show {
            display: flex;
        }
        .modal-content {
            background: white;
            padding: 32px 28px;
            border-radius: 40px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .modal-content h3 {
            font-size: 1.8rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 24px;
            text-align: center;
        }
        .modal-content input {
            width: 100%;
            padding: 15px 18px;
            margin-bottom: 16px;
            border: 1px solid #dde3e9;
            border-radius: 40px;
            font-size: 1rem;
        }
        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }
        .modal-actions button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 40px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
        }
        #loginSubmitBtn {
            background: #1e293b;
            color: white;
        }
        #loginSubmitBtn:hover {
            background: #0f172a;
        }
        #loginCancelBtn {
            background: #f1f5f9;
            color: #334155;
        }
        #loginCancelBtn:hover {
            background: #e2e8f0;
        }

        /* 手機微調 */
        @media (max-width: 550px) {
            .container {
                padding: 20px 16px;
            }
            .title { font-size: 1.9rem; }
            .date-nav { padding: 8px 8px; }
            .date-display { font-size: 1.1rem; padding: 6px 12px; }
            .slot-grid { grid-template-columns: repeat(2, 1fr); }
            .selected-hint { 
                flex-direction: column; 
                align-items: flex-start; 
                margin-bottom: 30px;
            }
            .selected-info span {
                margin-left: 0;
                display: block;
                width: fit-content;
            }
            .clear-selected {
                align-self: flex-end;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="title">🏓 匹克球場租用</div>

    <div class="date-nav">
        <button class="arrow-btn" id="prevDayBtn" aria-label="前一天">←</button>
        <span class="date-display" id="currentDateDisplay"></span>
        <button class="arrow-btn" id="nextDayBtn" aria-label="後一天">→</button>
    </div>

    <div id="slotGrid" class="slot-grid"></div>

    <div class="selected-hint" id="selectedHint">
        <span class="selected-info" id="selectedText">⏺ 尚未選取任何時段</span>
        <button class="clear-selected" id="clearSelectedBtn" type="button">✕ 清除</button>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label>姓名</label>
            <input type="text" id="nameInput" placeholder="例如 陳小明" autocomplete="off">
        </div>
        <div class="form-group">
            <label>電話號碼 (8位數字)</label>
            <input type="tel" id="phoneInput" placeholder="12345678" pattern="\d{8}" inputmode="numeric" autocomplete="off">
        </div>
        <div style="display: flex; align-items: end;">
            <button class="btn-primary" id="submitBookingBtn" disabled>📋 確認預約</button>
        </div>
    </div>

    <div class="admin-link">
        <button id="toggleAdminBtn">⚙️ 管理後台</button>
    </div>

    <div class="admin-panel" id="adminPanel">
        <div class="list-header">
            <h2>📌 本日預約 (管理)</h2>
            <button class="reset-btn" id="resetDayBtn">C 重設</button>
        </div>
        <ul class="appointment-list" id="appointmentList">
            <li class="empty-message">載入中...</li>
        </ul>
    </div>

    <div id="loginModal" class="modal">
        <div class="modal-content">
            <h3>管理員登入</h3>
            <input type="text" id="loginUsername" placeholder="帳號" value="">
            <input type="password" id="loginPassword" placeholder="密碼" value="">
            <div class="modal-actions">
                <button id="loginSubmitBtn">登入</button>
                <button id="loginCancelBtn">取消</button>
            </div>
        </div>
    </div>

    <div class="footer-note">
        ⚡ 資料暫存於瀏覽器 · 點擊「可預約」格子自動帶入時段 · 電話需8位數字
    </div>
</div>

<script>
(function() {
    'use strict';

    const SLOTS = [
        { start: '00:00', end: '01:00', price: 150 },
        { start: '01:00', end: '02:00', price: 150 },
        { start: '02:00', end: '03:00', price: 150 },
        { start: '03:00', end: '04:00', price: 150 },
        { start: '04:00', end: '05:00', price: 150 },
        { start: '05:00', end: '06:00', price: 150 },
        { start: '06:00', end: '07:00', price: 250 },
        { start: '07:00', end: '08:00', price: 250 },
        { start: '08:00', end: '09:00', price: 250 },
        { start: '09:00', end: '10:00', price: 250 },
        { start: '10:00', end: '11:00', price: 250 },
        { start: '11:00', end: '12:00', price: 250 },
        { start: '12:00', end: '13:00', price: 250 },
        { start: '13:00', end: '14:00', price: 250 },
        { start: '14:00', end: '15:00', price: 250 },
        { start: '15:00', end: '16:00', price: 250 },
        { start: '16:00', end: '17:00', price: 250 },
        { start: '17:00', end: '18:00', price: 250 },
        { start: '18:00', end: '19:00', price: 350 },
        { start: '19:00', end: '20:00', price: 350 },
        { start: '20:00', end: '21:00', price: 350 },
        { start: '21:00', end: '22:00', price: 350 },
        { start: '22:00', end: '23:00', price: 350 },
        { start: '23:00', end: '00:00', price: 350 }
    ];

    const ADMIN_CREDENTIALS = {
        username: 'admin',
        password: 'admin123'
    };

    const STORAGE_KEY = 'pickleball_bookings_clean';
    let currentDate = new Date();
    let selectedSlotStart = null;
    let currentBookings = [];

    const slotGrid = document.getElementById('slotGrid');
    const dateDisplay = document.getElementById('currentDateDisplay');
    const prevBtn = document.getElementById('prevDayBtn');
    const nextBtn = document.getElementById('nextDayBtn');
    const selectedText = document.getElementById('selectedText');
    const clearSelectedBtn = document.getElementById('clearSelectedBtn');
    const nameInput = document.getElementById('nameInput');
    const phoneInput = document.getElementById('phoneInput');
    const submitBtn = document.getElementById('submitBookingBtn');
    const appointmentList = document.getElementById('appointmentList');
    const resetBtn = document.getElementById('resetDayBtn');
    const toggleAdminBtn = document.getElementById('toggleAdminBtn');
    const adminPanel = document.getElementById('adminPanel');
    const loginModal = document.getElementById('loginModal');
    const loginUsername = document.getElementById('loginUsername');
    const loginPassword = document.getElementById('loginPassword');
    const loginSubmitBtn = document.getElementById('loginSubmitBtn');
    const loginCancelBtn = document.getElementById('loginCancelBtn');

    function formatDateKey(date) {
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const d = String(date.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
    }

    function getTwWeekday(date) {
        const weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
        return weekdays[date.getDay()];
    }

    function getDisplayDateStr(date) {
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const d = String(date.getDate()).padStart(2, '0');
        const wd = getTwWeekday(date);
        return `${y}年${m}月${d}日 ${wd}`;
    }

    function loadAllBookings() {
        try {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (!raw) return [];
            const parsed = JSON.parse(raw);
            return Array.isArray(parsed) ? parsed.filter(b => b && typeof b === 'object') : [];
        } catch (e) {
            console.warn('讀取失敗', e);
            return [];
        }
    }

    function saveAllBookings(bookings) {
        try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(bookings.slice(0, 500)));
        } catch (e) {
            alert('儲存失敗，但操作已生效(限額)');
        }
    }

    function refreshAll() {
        const all = loadAllBookings();
        const dateKey = formatDateKey(currentDate);
        currentBookings = all.filter(b => b.date === dateKey);
        renderSlotGrid();
        renderAppointmentList();
        updateSelectedUI();
        validateSubmitButton();
    }

    function renderSlotGrid() {
        if (!slotGrid) return;
        const all = loadAllBookings();
        const dateKey = formatDateKey(currentDate);
        const dayBookings = all.filter(b => b.date === dateKey);

        let html = '';
        for (let slot of SLOTS) {
            const start = slot.start;
            const end = slot.end;
            const price = slot.price;
            const isBooked = dayBookings.some(b => b.start === start);
            let statusText = isBooked ? '已滿' : '可預約';
            let cardClass = 'slot-card';
            if (isBooked) {
                cardClass += ' booked';
            } else {
                cardClass += ' clickable';
            }

            html += `<div class="${cardClass}" data-start="${start}" data-booked="${isBooked}">`;
            html += `<div class="slot-time">${start}-${end}</div>`;
            html += `<div class="slot-status">${statusText}</div>`;
            html += `<div class="slot-price">HK$${price}</div>`;
            html += `</div>`;
        }
        slotGrid.innerHTML = html;
    }

    function handleSlotClick(e) {
        const card = e.target.closest('.slot-card');
        if (!card) return;
        if (!card.classList.contains('clickable')) return;
        const start = card.dataset.start;
        if (!start) return;
        selectedSlotStart = start;
        updateSelectedUI();
        validateSubmitButton();
    }

    function updateSelectedUI() {
        if (selectedSlotStart) {
            const slot = SLOTS.find(s => s.start === selectedSlotStart);
            if (slot) {
                selectedText.innerHTML = `✅ 已選時段：<span>${slot.start} - ${slot.end}  HK$${slot.price}</span>`;
            } else {
                selectedSlotStart = null;
            }
        } else {
            selectedText.innerHTML = '⏺ 尚未選取任何時段';
        }
    }

    function clearSelected() {
        selectedSlotStart = null;
        updateSelectedUI();
        validateSubmitButton();
    }

    function validateSubmitButton() {
        const name = nameInput.value.trim();
        const phone = phoneInput.value.trim();
        const phoneValid = /^\d{8}$/.test(phone);
        let canSubmit = false;

        if (name && phoneValid && selectedSlotStart) {
            const all = loadAllBookings();
            const dateKey = formatDateKey(currentDate);
            const dayBookings = all.filter(b => b.date === dateKey);
            const alreadyBooked = dayBookings.some(b => b.start === selectedSlotStart);
            if (!alreadyBooked) {
                canSubmit = true;
            }
        }

        submitBtn.disabled = !canSubmit;
    }

    function handleSubmit() {
        if (submitBtn.disabled) return;

        const name = nameInput.value.trim();
        const phone = phoneInput.value.trim();
        if (!name || !/^\d{8}$/.test(phone) || !selectedSlotStart) return;

        const all = loadAllBookings();
        const dateKey = formatDateKey(currentDate);
        const already = all.some(b => b.date === dateKey && b.start === selectedSlotStart);
        if (already) {
            alert('剛剛已被預約，請重新選擇');
            clearSelected();
            refreshAll();
            return;
        }

        const newBooking = {
            id: 'bk_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8),
            name: name,
            phone: phone,
            date: dateKey,
            start: selectedSlotStart
        };

        all.push(newBooking);
        saveAllBookings(all);

        nameInput.value = '';
        phoneInput.value = '';
        clearSelected();
        refreshAll();
    }

    function renderAppointmentList() {
        if (!appointmentList) return;
        appointmentList.innerHTML = '';

        if (currentBookings.length === 0) {
            appointmentList.innerHTML = '<li class="empty-message">本日尚無預約</li>';
            return;
        }

        const sorted = [...currentBookings].sort((a, b) => a.start.localeCompare(b.start));
        sorted.forEach(bk => {
            const slot = SLOTS.find(s => s.start === bk.start) || { start: bk.start, end: '?' };
            const li = document.createElement('li');
            li.setAttribute('data-id', bk.id);
            const phoneDisplay = bk.phone.replace(/(\d{4})$/, '****$1');
            li.innerHTML = `
                <div class="appointment-info">
                    <strong>${escapeHtml(bk.name)}</strong> · 📱 ${escapeHtml(phoneDisplay)}<br>
                    <span class="appointment-date">${bk.start} - ${slot.end}</span>
                </div>
                <button class="delete-btn" aria-label="刪除">✕</button>
            `;
            appointmentList.appendChild(li);
        });
    }

    function escapeHtml(unsafe) {
        return unsafe.replace(/[&<>"]/g, function(m) {
            if(m === '&') return '&amp;'; if(m === '<') return '&lt;'; if(m === '>') return '&gt;'; if(m === '"') return '&quot;';
            return m;
        });
    }

    function handleListClick(e) {
        const del = e.target.closest('.delete-btn');
        if (!del) return;
        const li = del.closest('li');
        if (!li) return;
        const id = li.getAttribute('data-id');
        if (!id) return;

        let all = loadAllBookings();
        const newAll = all.filter(b => b.id !== id);
        if (newAll.length !== all.length) {
            saveAllBookings(newAll);
            refreshAll();
        }
    }

    function resetCurrentDay() {
        if (!confirm('確定重設本日所有預約？所有時段將變為可預約。')) return;

        let all = loadAllBookings();
        const dateKey = formatDateKey(currentDate);
        all = all.filter(b => b.date !== dateKey);
        saveAllBookings(all);
        clearSelected();
        refreshAll();
    }

    function changeDate(delta) {
        const newDate = new Date(currentDate);
        newDate.setDate(newDate.getDate() + delta);
        currentDate = newDate;
        clearSelected();
        refreshAll();
        dateDisplay.textContent = getDisplayDateStr(currentDate);
    }

    function updateDateDisplay() {
        dateDisplay.textContent = getDisplayDateStr(currentDate);
    }

    function showLoginModal() {
        loginModal.classList.add('show');
        loginUsername.value = '';
        loginPassword.value = '';
        loginUsername.focus();
    }

    function hideLoginModal() {
        loginModal.classList.remove('show');
    }

    function handleLogin() {
        const username = loginUsername.value.trim();
        const password = loginPassword.value.trim();
        if (username === ADMIN_CREDENTIALS.username && password === ADMIN_CREDENTIALS.password) {
            hideLoginModal();
            adminPanel.classList.add('visible');
            toggleAdminBtn.textContent = '🔒 關閉管理';
        } else {
            alert('帳號或密碼錯誤');
        }
    }

    function toggleAdminPanel() {
        if (adminPanel.classList.contains('visible')) {
            adminPanel.classList.remove('visible');
            toggleAdminBtn.textContent = '⚙️ 管理後台';
        } else {
            showLoginModal();
        }
    }

    function init() {
        updateDateDisplay();
        refreshAll();

        slotGrid.addEventListener('click', handleSlotClick);
        appointmentList.addEventListener('click', handleListClick);
        prevBtn.addEventListener('click', () => changeDate(-1));
        nextBtn.addEventListener('click', () => changeDate(1));
        clearSelectedBtn.addEventListener('click', clearSelected);
        submitBtn.addEventListener('click', handleSubmit);
        resetBtn.addEventListener('click', resetCurrentDay);
        toggleAdminBtn.addEventListener('click', toggleAdminPanel);

        nameInput.addEventListener('input', validateSubmitButton);
        phoneInput.addEventListener('input', validateSubmitButton);

        loginSubmitBtn.addEventListener('click', handleLogin);
        loginCancelBtn.addEventListener('click', hideLoginModal);
        loginModal.addEventListener('click', (e) => {
            if (e.target === loginModal) hideLoginModal();
        });
        loginPassword.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleLogin();
        });
        loginUsername.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') loginPassword.focus();
        });
    }

    init();
})();
</script>
</body>
</html>
